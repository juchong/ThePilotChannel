services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hangar-display:latest
    container_name: hangar-display
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # bind-mount the data DIRECTORY (not a single file) so atomic writes work
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
